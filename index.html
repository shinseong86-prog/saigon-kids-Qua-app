<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Saigon kids&qua · 회원 관리</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Be+Vietnam+Pro:wght@400;500;600;700&display=swap');

  :root{
    --bg:#0a1929;
    --bg-soft:#0f2438;
    --panel:#13314b;
    --panel-2:#17395a;
    --line:rgba(255,255,255,.08);
    --line-strong:rgba(255,255,255,.15);
    --ink:#eaf4ff;
    --ink-dim:#9fc0dd;
    --ink-faint:#6f93b3;
    --aqua:#36d6c3;
    --aqua-deep:#1fa89a;
    --wave:#46a8ff;
    --coral:#ff7a6b;
    --gold:#ffc861;
    --danger:#ff5c5c;
    --radius:16px;
    --shadow:0 18px 40px -20px rgba(0,0,0,.7);
  }

  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:'Be Vietnam Pro',system-ui,sans-serif;
    background:
      radial-gradient(1200px 600px at 80% -10%, rgba(70,168,255,.18), transparent 60%),
      radial-gradient(900px 500px at -10% 110%, rgba(54,214,195,.14), transparent 55%),
      var(--bg);
    color:var(--ink);
    min-height:100vh;
    -webkit-font-smoothing:antialiased;
  }

  /* ===== Layout ===== */
  .app{display:flex;min-height:100vh}
  .sidebar{
    width:248px;flex-shrink:0;
    background:linear-gradient(180deg,var(--bg-soft),rgba(15,36,56,.4));
    border-right:1px solid var(--line);
    padding:26px 18px;
    position:sticky;top:0;height:100vh;
    display:flex;flex-direction:column;
  }
  .brand{display:flex;align-items:center;gap:12px;padding:0 6px 24px}
  .brand .logo{
    width:42px;height:42px;border-radius:13px;flex-shrink:0;
    background:linear-gradient(135deg,var(--aqua),var(--wave));
    display:grid;place-items:center;font-size:22px;
    box-shadow:0 8px 20px -6px rgba(54,214,195,.6);
  }
  .brand h1{font-family:'Fraunces',serif;font-size:18px;font-weight:600;line-height:1.1}
  .brand span{font-size:11px;color:var(--ink-faint);letter-spacing:.5px}

  .nav{display:flex;flex-direction:column;gap:4px;flex:1}
  .nav button{
    display:flex;align-items:center;gap:12px;
    background:none;border:none;color:var(--ink-dim);
    font-family:inherit;font-size:14px;font-weight:500;
    padding:11px 14px;border-radius:11px;cursor:pointer;
    text-align:left;transition:.18s;width:100%;
  }
  .nav button .ico{font-size:17px;width:20px;text-align:center}
  .nav button:hover{background:rgba(255,255,255,.05);color:var(--ink)}
  .nav button.active{
    background:linear-gradient(135deg,rgba(54,214,195,.22),rgba(70,168,255,.16));
    color:#fff;box-shadow:inset 0 0 0 1px var(--line-strong);
  }
  .sidebar-foot{font-size:11px;color:var(--ink-faint);padding:14px 8px 0;border-top:1px solid var(--line);line-height:1.5}

  .main{flex:1;padding:32px 38px 64px;max-width:1180px}
  .page-head{display:flex;align-items:flex-end;justify-content:space-between;gap:16px;margin-bottom:26px;flex-wrap:wrap}
  .page-head h2{font-family:'Fraunces',serif;font-size:30px;font-weight:600;letter-spacing:-.5px}
  .page-head p{color:var(--ink-faint);font-size:13px;margin-top:4px}

  /* ===== Buttons ===== */
  .btn{
    font-family:inherit;font-weight:600;font-size:13px;
    border:none;border-radius:10px;padding:10px 18px;cursor:pointer;
    transition:.18s;display:inline-flex;align-items:center;gap:7px;
  }
  .btn-primary{background:linear-gradient(135deg,var(--aqua),var(--aqua-deep));color:#06231f}
  .btn-primary:hover{transform:translateY(-1px);box-shadow:0 10px 22px -10px var(--aqua)}
  .btn-ghost{background:rgba(255,255,255,.06);color:var(--ink);box-shadow:inset 0 0 0 1px var(--line)}
  .btn-ghost:hover{background:rgba(255,255,255,.1)}
  .btn-sm{padding:6px 12px;font-size:12px;border-radius:8px}
  .btn-danger{background:rgba(255,92,92,.14);color:var(--danger);box-shadow:inset 0 0 0 1px rgba(255,92,92,.3)}
  .btn-danger:hover{background:rgba(255,92,92,.24)}

  /* ===== Cards / stats ===== */
  .stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:16px;margin-bottom:28px}
  .stat{
    background:linear-gradient(160deg,var(--panel),var(--bg-soft));
    border:1px solid var(--line);border-radius:var(--radius);
    padding:20px;box-shadow:var(--shadow);position:relative;overflow:hidden;
  }
  .stat::after{content:"";position:absolute;right:-30px;top:-30px;width:90px;height:90px;border-radius:50%;background:radial-gradient(circle,rgba(70,168,255,.25),transparent 70%)}
  .stat .label{font-size:12px;color:var(--ink-faint);font-weight:500;display:flex;align-items:center;gap:6px}
  .stat .value{font-family:'Fraunces',serif;font-size:30px;font-weight:600;margin-top:8px}
  .stat .sub{font-size:12px;color:var(--ink-dim);margin-top:4px}

  .panel{
    background:linear-gradient(160deg,var(--panel),var(--bg-soft));
    border:1px solid var(--line);border-radius:var(--radius);
    box-shadow:var(--shadow);overflow:hidden;
  }
  .panel-head{display:flex;align-items:center;justify-content:space-between;padding:18px 22px;border-bottom:1px solid var(--line)}
  .panel-head h3{font-size:15px;font-weight:600}
  .panel-body{padding:6px 0}

  /* ===== Table ===== */
  table{width:100%;border-collapse:collapse;font-size:13.5px}
  thead th{
    text-align:left;font-size:11px;font-weight:600;letter-spacing:.6px;
    text-transform:uppercase;color:var(--ink-faint);
    padding:12px 22px;border-bottom:1px solid var(--line);
  }
  tbody td{padding:14px 22px;border-bottom:1px solid var(--line)}
  tbody tr:last-child td{border-bottom:none}
  tbody tr:hover{background:rgba(255,255,255,.03)}
  /* ===== Attendance (monthly) ===== */
  .tabs{display:flex;gap:8px;margin-bottom:18px}
  .tab{padding:8px 20px;border-radius:11px;border:1px solid var(--line-strong);background:rgba(255,255,255,.04);color:var(--ink-dim);font-family:inherit;font-size:13.5px;font-weight:600;cursor:pointer;transition:.15s}
  .tab:hover{background:rgba(255,255,255,.08)}
  .tab.on{background:linear-gradient(135deg,var(--aqua),var(--aqua-deep));color:#06231f;border-color:transparent}
  .month-nav{display:flex;align-items:center;gap:8px;margin-bottom:16px;flex-wrap:wrap}
  .month-label{font-family:'Fraunces',serif;font-size:18px;font-weight:600;min-width:120px;text-align:center}
  .dots{display:flex;flex-wrap:wrap;gap:7px;align-items:center}
  .att-dot{width:22px;height:22px;border-radius:50%;cursor:pointer;display:inline-block;transition:transform .08s;flex-shrink:0}
  .att-dot:hover{transform:scale(1.18)}
  .att-dot.over{box-shadow:0 0 0 2px var(--gold)}
  .datelog{display:flex;align-items:center;flex-wrap:wrap;gap:5px;margin-top:7px}
  .dl-key{font-size:11px;font-weight:700;margin-right:2px}
  .date-chip{font-size:11.5px;padding:2px 8px;border-radius:7px;cursor:pointer;border:1px solid var(--line-strong);transition:.12s}
  .date-chip:hover{transform:translateY(-1px)}
  .chip-makeup{background:rgba(255,200,97,.14);color:var(--gold);border-color:rgba(255,200,97,.4)}
  .chip-absent{background:rgba(255,92,92,.14);color:var(--danger);border-color:rgba(255,92,92,.4)}
  .name-cell{display:flex;align-items:center;gap:11px}
  .avatar{width:34px;height:34px;border-radius:10px;display:grid;place-items:center;font-weight:700;font-size:13px;color:#06231f;flex-shrink:0}
  .muted{color:var(--ink-faint);font-size:12.5px}

  .tag{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:600;padding:4px 10px;border-radius:20px}
  .tag-kid{background:rgba(255,200,97,.16);color:var(--gold)}
  .tag-adult{background:rgba(159,192,221,.14);color:var(--ink-dim)}
  .tag-active{background:rgba(54,214,195,.16);color:var(--aqua)}
  .tag-low{background:rgba(255,122,107,.16);color:var(--coral)}
  .tag-expired{background:rgba(255,92,92,.16);color:var(--danger)}

  .empty{padding:48px 22px;text-align:center;color:var(--ink-faint)}
  .empty .big{font-size:34px;margin-bottom:10px;opacity:.6}

  /* ===== Modal ===== */
  .overlay{position:fixed;inset:0;background:rgba(4,12,22,.7);backdrop-filter:blur(6px);display:none;align-items:center;justify-content:center;z-index:50;padding:20px}
  .overlay.show{display:flex}
  .modal{
    width:100%;max-width:460px;background:var(--panel-2);
    border:1px solid var(--line-strong);border-radius:18px;
    box-shadow:0 30px 70px -20px rgba(0,0,0,.8);overflow:hidden;
    animation:pop .22s ease;
  }
  @keyframes pop{from{transform:scale(.95) translateY(8px);opacity:0}to{transform:none;opacity:1}}
  .modal-head{padding:20px 24px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center}
  .modal-head h3{font-family:'Fraunces',serif;font-size:19px;font-weight:600}
  .modal-head .x{background:none;border:none;color:var(--ink-faint);font-size:22px;cursor:pointer;line-height:1}
  .modal-body{padding:22px 24px;max-height:65vh;overflow:auto}
  .modal-foot{padding:16px 24px;border-top:1px solid var(--line);display:flex;justify-content:flex-end;gap:10px}

  .field{margin-bottom:16px}
  .field label{display:block;font-size:12.5px;font-weight:600;color:var(--ink-dim);margin-bottom:7px}
  .field input,.field select{
    width:100%;background:var(--bg-soft);border:1px solid var(--line-strong);
    color:var(--ink);font-family:inherit;font-size:14px;
    padding:11px 13px;border-radius:10px;outline:none;transition:.16s;
  }
  .field input:focus,.field select:focus{border-color:var(--aqua);box-shadow:0 0 0 3px rgba(54,214,195,.15)}
  .field-row{display:flex;gap:12px}
  .field-row .field{flex:1}
  .check{display:flex;align-items:center;gap:9px;cursor:pointer;font-size:13.5px;color:var(--ink)}
  .check input{width:auto}

  .searchbar{display:flex;gap:10px;margin-bottom:18px;flex-wrap:wrap}
  .searchbar input,.searchbar select{
    background:var(--bg-soft);border:1px solid var(--line);color:var(--ink);
    font-family:inherit;font-size:13.5px;padding:9px 13px;border-radius:10px;outline:none;
  }
  .searchbar input{flex:1;min-width:180px}
  .searchbar input:focus,.searchbar select:focus{border-color:var(--aqua)}

  .bday-list{display:grid;gap:12px}
  .bday{display:flex;align-items:center;gap:14px;padding:16px 20px;background:linear-gradient(160deg,var(--panel),var(--bg-soft));border:1px solid var(--line);border-radius:14px}
  .bday.soon{box-shadow:inset 0 0 0 1px rgba(255,200,97,.3)}
  .bday .cake{font-size:24px}
  .bday .when{margin-left:auto;text-align:right}
  .bday .when .d{font-weight:700;color:var(--gold)}

  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--aqua);color:#06231f;font-weight:600;font-size:13px;padding:12px 22px;border-radius:12px;opacity:0;transition:.3s;z-index:90;box-shadow:0 14px 30px -10px rgba(54,214,195,.7)}
  .toast.show{opacity:1;transform:translateX(-50%)}

  @media(max-width:860px){
    .app{flex-direction:column}
    .sidebar{width:100%;height:auto;position:static;flex-direction:row;align-items:center;flex-wrap:wrap;padding:14px}
    .brand{padding:0 12px 0 4px}
    .nav{flex-direction:row;flex-wrap:wrap;gap:4px}
    .nav button{padding:8px 12px}
    .nav button span.txt{display:none}
    .nav button .ico{font-size:19px}
    .sidebar-foot{display:none}
    .main{padding:22px 18px 60px}
    .page-head h2{font-size:24px}
  }
  .detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:2px 18px;margin-bottom:16px}
  .di{display:flex;justify-content:space-between;gap:10px;padding:8px 0;border-bottom:1px solid var(--line)}
  .dk{color:var(--ink-faint);font-size:12.5px}
  .dv{font-size:13px;font-weight:500;text-align:right;color:var(--ink)}
  .detail-h{font-size:13px;margin:16px 0 8px;display:flex;gap:8px;align-items:center}
  .detail-scroll{max-height:190px;overflow:auto;border:1px solid var(--line);border-radius:10px}
  .detail-scroll table{width:100%}
  .detail-scroll td{padding:8px 13px;border-bottom:1px solid var(--line);font-size:12.5px}
  .att-btns{display:inline-flex;gap:5px}
  .clickable{cursor:pointer}
  .clickable:hover{text-decoration:underline}
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="brand">
      <div class="logo">🐬</div>
      <div>
        <h1>Saigon kids&qua</h1>
        <span>회원 관리 시스템</span>
      </div>
    </div>
    <nav class="nav" id="nav">
      <button data-page="dashboard" class="active"><span class="ico">📊</span><span class="txt">대시보드</span></button>
      <button data-page="members"><span class="ico">🧑‍🤝‍🧑</span><span class="txt">회원 관리</span></button>
      <button data-page="attendance"><span class="ico">✅</span><span class="txt">출석</span></button>
      <button data-page="passes"><span class="ico">🎫</span><span class="txt">회원권 관리</span></button>
      <button data-page="payments"><span class="ico">💳</span><span class="txt">결제 내역</span></button>
      <button data-page="birthdays"><span class="ico">🎂</span><span class="txt">생일</span></button>
    </nav>
    <div class="sidebar-foot">
      데이터는 이 브라우저에 저장됩니다 (localStorage).<br>
      <span id="lastSaved"></span>
    </div>
  </aside>

  <main class="main" id="main"></main>
</div>

<!-- Member modal -->
<div class="overlay" id="memberModal">
  <div class="modal">
    <div class="modal-head">
      <h3 id="memberModalTitle">회원 추가</h3>
      <button class="x" onclick="closeModal('memberModal')">&times;</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="m_id">
      <div class="field">
        <label>이름 (Họ và tên)</label>
        <input id="m_name" placeholder="예: Nguyễn Minh Anh">
      </div>
      <div class="field-row">
        <div class="field">
          <label>전화번호</label>
          <input id="m_phone" placeholder="0901 234 567">
        </div>
        <div class="field">
          <label>생일</label>
          <input id="m_birth" type="date">
        </div>
      </div>
      <div class="field-row">
        <div class="field">
          <label>회원권</label>
          <select id="m_tier"></select>
        </div>
        <div class="field">
          <label>등록일</label>
          <input id="m_join" type="date">
        </div>
      </div>
      <div class="field-row">
        <div class="field">
          <label>나이</label>
          <input id="m_age" type="number" min="0" max="100" placeholder="예: 8">
        </div>
        <div class="field">
          <label>성별</label>
          <select id="m_gender">
            <option value="">-</option>
            <option value="M">남</option>
            <option value="F">여</option>
          </select>
        </div>
        <div class="field">
          <label>보강 잔여</label>
          <input id="m_makeup" type="number" min="0" placeholder="0">
        </div>
      </div>
      <div class="field-row">
        <div class="field">
          <label>학년 <span style="color:var(--ink-faint);font-weight:400">(9월 자동 진급)</span></label>
          <input id="m_grade" type="number" min="0" max="12" placeholder="예: 3">
        </div>
        <div class="field">
          <label>학교</label>
          <input id="m_school" placeholder="예: ABC International School">
        </div>
      </div>
      <div class="field">
        <label class="check"><input type="checkbox" id="m_kid"> 어린이 회원 (Trẻ em)</label>
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn btn-ghost" onclick="closeModal('memberModal')">취소</button>
      <button class="btn btn-primary" onclick="saveMember()">저장</button>
    </div>
  </div>
</div>

<!-- Pass/tier modal -->
<div class="overlay" id="tierModal">
  <div class="modal">
    <div class="modal-head">
      <h3 id="tierModalTitle">회원권 추가</h3>
      <button class="x" onclick="closeModal('tierModal')">&times;</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="t_id">
      <div class="field">
        <label>회원권 이름</label>
        <input id="t_name" placeholder="예: 주 2회반">
      </div>
      <div class="field-row">
        <div class="field">
          <label>주당 횟수</label>
          <input id="t_perweek" type="number" min="1" placeholder="2">
        </div>
        <div class="field">
          <label>월 가격 (VND)</label>
          <input id="t_price" type="number" min="0" placeholder="1500000">
        </div>
      </div>
      <div class="field">
        <label>총 세션 수 (선택)</label>
        <input id="t_sessions" type="number" min="0" placeholder="예: 8">
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn btn-ghost" onclick="closeModal('tierModal')">취소</button>
      <button class="btn btn-primary" onclick="saveTier()">저장</button>
    </div>
  </div>
</div>

<!-- Payment modal -->
<div class="overlay" id="detailModal">
  <div class="modal" style="max-width:560px">
    <div class="modal-head">
      <h3 id="detailTitle">회원 상세</h3>
      <button class="x" onclick="closeModal('detailModal')">&times;</button>
    </div>
    <div class="modal-body" id="detailBody"></div>
    <div class="modal-foot">
      <button class="btn btn-ghost" onclick="closeModal('detailModal')">닫기</button>
      <button class="btn btn-primary" id="detailEditBtn">수정</button>
    </div>
  </div>
</div>

<div class="overlay" id="attModal">
  <div class="modal" style="max-width:420px">
    <div class="modal-head">
      <h3 id="attModalTitle">출결 기록</h3>
      <button class="x" onclick="closeModal('attModal')">&times;</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="a_id">
      <input type="hidden" id="a_member">
      <div class="field">
        <label>회원</label>
        <input id="a_name" disabled>
      </div>
      <div class="field-row">
        <div class="field">
          <label>구분</label>
          <select id="a_status">
            <option value="present">출석</option>
            <option value="makeup">보강</option>
            <option value="absent">결석</option>
          </select>
        </div>
        <div class="field">
          <label>날짜</label>
          <input id="a_date" type="date">
        </div>
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn btn-danger" id="a_delBtn" onclick="delAttEntry()" style="margin-right:auto">삭제</button>
      <button class="btn btn-ghost" onclick="closeModal('attModal')">취소</button>
      <button class="btn btn-primary" onclick="saveAttEntry()">저장</button>
    </div>
  </div>
</div>

<div class="overlay" id="quitModal">
  <div class="modal" style="max-width:380px">
    <div class="modal-head">
      <h3>퇴원 처리</h3>
      <button class="x" onclick="closeModal('quitModal')">&times;</button>
    </div>
    <div class="modal-body">
      <p class="muted" style="font-size:13px;margin-bottom:14px"><b id="quitName"></b> 회원의 퇴원 사유를 선택하세요. (기록은 보존됩니다)</p>
      <div id="quitReasons"></div>
    </div>
    <div class="modal-foot">
      <button class="btn btn-ghost" onclick="closeModal('quitModal')">취소</button>
    </div>
  </div>
</div>

<div class="overlay" id="importModal">
  <div class="modal" style="max-width:560px">
    <div class="modal-head">
      <h3>데이터 붙여넣기로 불러오기</h3>
      <button class="x" onclick="closeModal('importModal')">&times;</button>
    </div>
    <div class="modal-body">
      <p class="muted" style="font-size:12.5px;line-height:1.6;margin-bottom:10px">
        웹앱 주소(<b>…/exec</b>)를 브라우저에서 연 화면의 내용을 <b>전체 선택→복사</b>해서 아래에 붙여넣고 불러오기를 누르세요.
        (<code>test({…})</code> 형태든 <code>{…}</code> 형태든 모두 됩니다.)
      </p>
      <textarea id="importText" placeholder='{ "members": [...], "payments": [...], "attendance": [...] }'

function billingYm(dateStr){
  const s=(dateStr||'').slice(0,10); const parts=s.split('-');
  if(parts.length<3) return s.slice(0,7);
  let y=Number(parts[0]), m=Number(parts[1]), d=Number(parts[2]);
  if(!y||!m||!d) return s.slice(0,7);
  if(d>=18){ m+=1; if(m>12){m=1;y+=1;} }
  return y+'-'+String(m).padStart(2,'0');
}
function billingPeriodRange(ym){ // ym='YYYY-MM' → 해당 매출월의 실제 결제 집계 기간(문자열)
  const [y,m]=ym.split('-').map(Number);
  let py=y, pm=m-1; if(pm<1){pm=12;py--;}
  return `${pm}/18 ~ ${m}/17`;
}
const SYNC_URL_KEY='saigon_sync_url';
const SYNC_AT_KEY='saigon_sync_at';

function saveSyncUrl(){
  const u=(document.getElementById('syncUrl').value||'').trim();
  if(u) localStorage.setItem(SYNC_URL_KEY,u); else localStorage.removeItem(SYNC_URL_KEY);

}
function updateSyncStatus(){
  const el=document.getElementById('syncStatus'); if(!el)return;
  const at=localStorage.getItem(SYNC_AT_KEY);
  el.textContent = at ? '마지막 동기화: '+new Date(at).toLocaleString('ko-KR') : '아직 동기화한 적 없음';
}
function syncNow(silent){
  const url=localStorage.getItem(SYNC_URL_KEY);
  if(!url){ if(!silent) toast('먼저 Apps Script 웹앱 URL을 저장하세요'); return; }
  const st=document.getElementById('syncStatus'); if(st) st.textContent='동기화 중…';
  const cb='__sync_cb_'+Date.now();
  const sc=document.createElement('script');
  const timer=setTimeout(function(){ cleanup(); if(!silent) toast('동기화 시간초과 — URL/배포 권한 확인'); }, 20000);
  function cleanup(){ try{delete window[cb];}catch(e){window[cb]=undefined;} if(sc.parentNode) sc.parentNode.removeChild(sc); clearTimeout(timer); }
  window[cb]=function(resp){ cleanup(); applySync(resp); };
  sc.onerror=function(){ cleanup(); if(!silent) toast('동기화 실패 — URL을 확인하세요'); updateSyncStatus(); };
  const sep=url.indexOf('?')>-1?'&':'?';
  sc.src=url+sep+'callback='+cb+'&t='+Date.now();
  document.body.appendChild(sc);
}
function openImport(){ const t=document.getElementById('importText'); if(t) t.value=''; showModal('importModal'); }
function runImport(){
  let raw=(document.getElementById('importText').value||'').trim();
  if(!raw){ toast('데이터를 붙여넣어 주세요'); return; }
  // 브라우저가 끼워넣은 HTML 태그 제거
  raw=raw.replace(/<[^>]*>/g,'');
  // HTML 엔티티 복원(&quot; 등)
  raw=raw.replace(/&quot;/g,'"').replace(/&#34;/g,'"').replace(/&#39;/g,"'")
        .replace(/&lt;/g,'<').replace(/&gt;/g,'>').replace(/&amp;/g,'&').replace(/&nbsp;/g,' ');
  // 가장 바깥 { … } 만 추출 (test({…}) 같은 JSONP 래퍼·앞뒤 잡텍스트 모두 제거)
  const a=raw.indexOf('{'), b=raw.lastIndexOf('}');
  if(a>-1 && b>a) raw=raw.slice(a,b+1);
  let data;
  try{ data=JSON.parse(raw); }
  catch(e){
    toast('형식 오류 — 받은 내용 앞부분: '+raw.slice(0,60));
    return;
  }
  closeModal('importModal');
  applySync(data);
}
function applySync(resp){
  if(!resp||resp.error||!Array.isArray(resp.members)){

  resp.members = resp.members.filter(function(m){

  // 기존 회원의 직접 입력 항목(학교·학년·전화·생일 등)은 보존하고, 시트가 관리하는 항목만 갱신
  const prev={}; (DB.members||[]).forEach(function(m){prev[m.id]=m;});
  DB.members = resp.members.map(function(m){
    const p=prev[m.id]||{};
    const merged=Object.assign({phone:'',birth:'',kid:true,join:''}, p, {
      id:m.id, name:m.name, gender:m.gender, makeup:m.makeup, tierId:m.tierId, first:m.first, age:m.age, kid:(m.kid!==undefined?m.kid:(p.kid!==undefined?p.kid:true)),

    });
    // 학교·학년 등 직접 입력값 유지
    merged.school=p.school||m.school||'';

    merged.gradeBaseYear=(p.gradeBaseYear!=null)?p.gradeBaseYear:(m.gradeBaseYear!=null?m.gradeBaseYear:null);
    merged.birthYear=(p.birthYear!=null)?p.birthYear:(m.age?(curYear()-m.age+1):(m.birthYear||null));
    if(p.phone) merged.phone=p.phone;
    if(p.birth) merged.birth=p.birth;
    if(p.join) merged.join=p.join;
    if(p.quit){merged.quit=true; merged.quitDate=p.quitDate||''; if(p.quitReason)merged.quitReason=p.quitReason;}
    return merged;

  // 시트에서 빠졌어도 '퇴원'으로 표시된 회원은 기록 보존을 위해 유지
  const syncedIds={}; DB.members.forEach(function(m){syncedIds[m.id]=1;});

const vnd = n => (Number(n)||0).toLocaleString('vi-VN')+' ₫';
const tierName = tid => (DB.tiers.find(t=>t.id===tid)||{}).name || '미지정';
const tierOf = tid => DB.tiers.find(t=>t.id===tid);
const memberName = mid => (DB.members.find(m=>m.id===mid)||{}).name || '(삭제됨)';
const avatarColor = name => {
  const colors=['#36d6c3','#46a8ff','#ffc861','#ff7a6b','#a78bff','#5fd17a'];
  let h=0;for(const c of name)h=(h*31+c.charCodeAt(0))>>>0;
  return colors[h%colors.length];
};
const initials = name => {
  const p=name.trim().split(/\s+/);
  return (p.length>1?p[p.length-2][0]+p[p.length-1][0]:name.slice(0,2)).toUpperCase();
};

function monthlyUsed(memberId, ym){
  ym = ym || todayISO().slice(0,7);
  return DB.attendance.filter(a=>a.memberId===memberId && (a.date||'').slice(0,7)===ym && (a.status||'present')!=='absent').length;
}
function sessionsUsed(memberId){
  // 회원권 '잔여'는 이번 달 출석 기준 (월 정원 4/8/12회)
  return monthlyUsed(memberId, todayISO().slice(0,7));
}
function passStatus(m){
  const t=tierOf(m.tierId);
  if(!t || !t.sessions) return {label:'활성',cls:'tag-active',used:sessionsUsed(m.id),total:null};
  const used=sessionsUsed(m.id);
  const left=t.sessions-used;
  if(left<=0) return {label:'소진',cls:'tag-expired',used,total:t.sessions};
  if(left<=2) return {label:'잔여 '+left+'회',cls:'tag-low',used,total:t.sessions};
  return {label:'잔여 '+left+'회',cls:'tag-active',used,total:t.sessions};
}

function daysUntilBirthday(birth){
  if(!birth) return null;
  const now=new Date(); now.setHours(0,0,0,0);
  const b=new Date(birth);
  let next=new Date(now.getFullYear(),b.getMonth(),b.getDate());
  if(next<now) next.setFullYear(now.getFullYear()+1);
  return Math.round((next-now)/86400000);
}

function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  clearTimeout(t._tm);t._tm=setTimeout(()=>t.classList.remove('show'),1800);
}

function drawMembers(){

    const q=memberSearch.toLowerCase();

    else if(memberFilter==='kid') okF=!m.quit&&m.kid;
    else if(memberFilter==='adult') okF=!m.quit&&!m.kid;
    else if(memberFilter==='quit') okF=!!m.quit;
    else okF=true; // all
    return okQ&&okF;
  });
  list.sort(function(a,b){
    // 전체 보기에선 활동중 먼저, 그 안에서 가나다순

    }).join('');
    reasonPanel=`<div style="margin-bottom:18px"><h4 class="detail-h" style="margin-top:0">📊 퇴원 사유 비율 <span class="muted" style="font-weight:400">총 ${totalQ}명</span></h4>${rows}</div>`;
  }
  el.innerHTML=reasonPanel+`<table><thead><tr><th>회원</th><th>나이·성별</th><th>학년·학교</th><th>회원권</th><th>보강</th><th></th></tr></thead><tbody>${

      <td class="muted">${ag?ag+'세':'-'}${m.gender?' · '+genderKo(m.gender):''}</td>
      <td class="muted">${gradeLabel(m)||'-'}${m.school?' · '+m.school:''}</td>
      <td>${tierName(m.tierId)} <span class="tag ${s.cls}" style="margin-left:4px">${s.label}</span></td>
      <td>${m.makeup>0?`<span class="tag tag-low">${m.makeup}회</span>`:'<span class="muted">0</span>'}</td>
      <td style="text-align:right;white-space:nowrap">

    name,

function delMember(mid){
  if(!confirm('이 회원을 삭제할까요? 출석·결제 기록도 함께 삭제됩니다.'))return;
  DB.members=DB.members.filter(m=>m.id!==mid);
  DB.attendance=DB.attendance.filter(a=>a.memberId!==mid);
  DB.payments=DB.payments.filter(p=>p.memberId!==mid);
  save();render();toast('삭제되었습니다');
}
const QUIT_REASONS=[
  {k:'return', label:'한국 복귀·이사'},
  {k:'teacher', label:'다른 선생님께'},
  {k:'stamina', label:'아이 체력 문제'},
  {k:'etc', label:'기타'}
];
function quitReasonLabel(k){ const r=QUIT_REASONS.find(x=>x.k===k); return r?r.label:'미입력'; }
function quitReasonStats(){
  const c={}; QUIT_REASONS.forEach(r=>c[r.k]=0); c['none']=0;
  DB.members.filter(m=>m.quit).forEach(function(m){
    const k=m.quitReason; if(k&&c[k]!=null)c[k]++; else c['none']++;
  });

}
let pendingQuitId=null;
function toggleQuit(mid){
  const m=DB.members.find(x=>x.id===mid); if(!m)return;
  if(!m.quit){ openQuit(mid); }
  else { m.quit=false; delete m.quitDate; delete m.quitReason; save();render();toast(m.name+' 복귀 처리되었습니다'); }
}
function openQuit(mid){

/* ================= Attendance ================= */
let attDate=todayISO();
let attMonth=todayISO().slice(0,7);
let attTab='month';
let attExtraQuery='';                     // 일별 탭: '오늘 목록에 없는 아이' 검색어
const DOW_CODES=['sun','mon','tue','wed','thu','fri','sat'];
const DOW_KO={mon:'월',tue:'화',wed:'수',thu:'목',fri:'금',sat:'토',sun:'일'};
function dowCodeOf(dateStr){ return DOW_CODES[new Date(dateStr+'T00:00:00').getDay()]; }
const isEngName = s => /^[A-Za-z]/.test((s||'').trim());
function sortMembersKo(list){
  return [...list].sort(function(a,b){
    const ae=isEngName(a.name), be=isEngName(b.name);
    if(ae && !be) return -1;
    if(!ae && be) return 1;
    return (a.name||'').localeCompare(b.name||'', ae?'en':'ko');
  });
}

const monthLabel = ym => { const [y,m]=ym.split('-'); return y+'년 '+(+m)+'월'; };
function quotaOf(m){ const t=tierOf(m.tierId); if(t&&t.sessions) return t.sessions; if(t&&t.perWeek) return t.perWeek*4; return 0; }
function shiftMonth(delta){
  let [y,m]=attMonth.split('-').map(Number); m+=delta;
  if(m<1){m=12;y--;} if(m>12){m=1;y++;}
  attMonth=y+'-'+String(m).padStart(2,'0');
  if(attTab==='grid') drawGridAtt(); else drawMonthAtt();
}
function setAttTab(t){ attTab=t; renderAttendance(); }

function renderAttendance(){
  main.innerHTML=`
    <div class="page-head">
      <div><h2>출석</h2><p>${attTab==='month'?'월별 정원(주1회 4 · 주2회 8 · 주3회 12) 기준 출석':attTab==='grid'?'한 화면에서 보는 전체 출결 현황':'날짜별 출석 체크'}</p></div>
    </div>
    <div class="tabs">
      <button class="tab ${attTab==='month'?'on':''}" onclick="setAttTab('month')">월별</button>
      <button class="tab ${attTab==='day'?'on':''}" onclick="setAttTab('day')">일별</button>
      <button class="tab ${attTab==='grid'?'on':''}" onclick="setAttTab('grid')">전체보기</button>
    </div>
    <div id="attWrap"></div>`;
  if(attTab==='month') drawMonthAtt(); else if(attTab==='grid') drawGridAtt(); else drawDayAtt();
}

/* ---- 월별: 정원만큼 동그라미를 채우는 방식 ---- */
function attDot(state,onclick,title,over){
  const map={present:'var(--aqua)', makeup:'var(--gold)'};
  const isEmpty=state==='empty';
  const bg=isEmpty?'transparent':(map[state]||'var(--aqua)');
  const border=isEmpty?'2px dashed var(--line-strong)':'none';
  return `<span class="att-dot${over?' over':''}" onclick="${onclick}" title="${title||''}" style="background:${bg};border:${border}"></span>`;
}
function drawMonthAtt(){
  const wrap=document.getElementById('attWrap');
  if(!DB.members.length){wrap.innerHTML=`<div class="empty"><div class="big">🧑‍🤝‍🧑</div>먼저 회원을 등록하세요.</div>`;return}
  let totUsed=0,totQuota=0;
  DB.members.forEach(m=>{ totUsed+=monthlyUsed(m.id,attMonth); totQuota+=quotaOf(m); });
  const rate=totQuota?Math.round(totUsed/totQuota*100):0;
  const rows=sortMembersKo(DB.members).map(m=>{
    const recs=DB.attendance.filter(a=>a.memberId===m.id && (a.date||'').slice(0,7)===attMonth)
      .sort((a,b)=>(a.date+a.id).localeCompare(b.date+b.id));
    const non=recs.filter(a=>(a.status||'present')!=='absent');     // 출석+보강 (정원 소진)
    const makeupN=non.filter(a=>(a.status)==='makeup').length;
    const absentN=recs.length-non.length;                            // 결석
    const quota=quotaOf(m);
    const used=non.length;
    const over=quota>0 && used>quota;
    let dots='';
    non.forEach(a=>{ const st=a.status||'present';
      dots+=attDot(st,`openAttEdit('${a.id}')`, (st==='makeup'?'보강':'출석')+' · '+a.date+' (눌러서 수정/삭제)', over); });
    for(let i=non.length;i<quota;i++){ dots+=attDot('empty',`addMonthAtt('${m.id}','present')`, '출석 체크 (오늘)'); }
    // 결석·보강 날짜 칩 (학부모 분쟁 방지용 기록)
    const mkRecs=recs.filter(a=>a.status==='makeup').sort((a,b)=>a.date.localeCompare(b.date));
    const abRecs=recs.filter(a=>(a.status||'present')==='absent').sort((a,b)=>a.date.localeCompare(b.date));
    const subParts=[];
    if(makeupN) subParts.push(`보강 ${makeupN}`);
    if(absentN) subParts.push(`결석 ${absentN}`);
    const sub=subParts.length?`<div class="muted" style="font-size:11px;margin-top:2px">${subParts.join(' · ')}</div>`:'';
    const chip=(a,cls)=>`<span class="date-chip ${cls}" onclick="openAttEdit('${a.id}')" title="눌러서 수정/삭제">${md(a.date)}</span>`;
    let datelog='';
    if(mkRecs.length) datelog+=`<div class="datelog"><span class="dl-key" style="color:var(--gold)">보강</span>${mkRecs.map(a=>chip(a,'chip-makeup')).join('')}</div>`;
    if(abRecs.length) datelog+=`<div class="datelog"><span class="dl-key" style="color:var(--danger)">결석</span>${abRecs.map(a=>chip(a,'chip-absent')).join('')}</div>`;
    return `<tr>
      <td><div class="name-cell clickable" onclick="openDetail('${m.id}')"><div class="avatar" style="background:${avatarColor(m.name)}">${initials(m.name)}</div>${m.name}</div></td>
      <td class="muted" style="white-space:nowrap">${tierName(m.tierId)}</td>
      <td style="white-space:nowrap"><b style="color:${over?'var(--gold)':'var(--ink)'}">${used}</b><span class="muted">/${quota||'-'}</span>${sub}</td>
      <td><div class="dots">${dots||'<span class="muted">정원 미설정</span>'}</div>${datelog}</td>
      <td style="text-align:right;white-space:nowrap">
        <div class="att-btns">
          <button class="btn btn-ghost btn-sm" onclick="openAttEntry('${m.id}','makeup')">+보강</button>
          <button class="btn btn-ghost btn-sm" onclick="openAttEntry('${m.id}','absent')">+결석</button>
        </div>
      </td>
    </tr>`;
  }).join('');
  wrap.innerHTML=`
    <div class="month-nav">
      <button class="btn btn-ghost btn-sm" onclick="shiftMonth(-1)">◀</button>
      <span class="month-label">${monthLabel(attMonth)}</span>
      <button class="btn btn-ghost btn-sm" onclick="shiftMonth(1)">▶</button>
      <span class="muted" style="margin-left:14px;font-size:12.5px">이번 달 출석 <b style="color:var(--ink)">${totUsed}</b> / 정원 ${totQuota} · 달성률 ${rate}%</span>
    </div>
    <div class="panel"><div class="panel-body"><table>
      <thead><tr><th>회원</th><th>회원권</th><th>이번 달</th><th>세션 (빈칸=출석 · 누르면 삭제)</th><th style="text-align:right">보강·결석</th></tr></thead>
      <tbody>${rows}</tbody></table></div></div>`;
}
function addMonthAtt(mid,status){
  status=status||'present';
  const date = (attMonth===todayISO().slice(0,7)) ? todayISO() : attMonth+'-15';
  DB.attendance.push({id:id(),memberId:mid,date:date,status:status,src:'app'});
  save();drawMonthAtt();
}
const md = d => { if(!d) return ''; const [,m,day]=d.split('-'); return (+m)+'/'+(+day); };
function openAttEntry(mid,status){
  const m=DB.members.find(x=>x.id===mid); if(!m)return;
  document.getElementById('attModalTitle').textContent='출결 기록 추가';
  document.getElementById('a_id').value='';
  document.getElementById('a_member').value=mid;

  document.getElementById('a_delBtn').style.display='none';
  showModal('attModal');
}
function openAttEdit(recId){
  const a=DB.attendance.find(x=>x.id===recId); if(!a)return;
  const m=DB.members.find(x=>x.id===a.memberId);
  document.getElementById('attModalTitle').textContent='출결 기록 수정';
  document.getElementById('a_id').value=a.id;
  document.getElementById('a_member').value=a.memberId;
  document.getElementById('a_name').value=m?m.name:'';
  document.getElementById('a_status').value=a.status||'present';
  document.getElementById('a_date').value=a.date||todayISO();
  document.getElementById('a_delBtn').style.display='';

}
function saveAttEntry(){
  const rid=document.getElementById('a_id').value;
  const mid=document.getElementById('a_member').value;
  const status=document.getElementById('a_status').value;
  const date=document.getElementById('a_date').value;
  if(!date){toast('날짜를 선택하세요');return}
  if(rid){ const a=DB.attendance.find(x=>x.id===rid); if(a){a.status=status;a.date=date;} }
  else{ DB.attendance.push({id:id(),memberId:mid,date:date,status:status,src:'app'}); }
  save();closeModal('attModal');drawMonthAtt();toast('저장되었습니다');
}
function delAttEntry(){
  const rid=document.getElementById('a_id').value;
  const i=DB.attendance.findIndex(x=>x.id===rid);
  if(i>=0) DB.attendance.splice(i,1);
  save();closeModal('attModal');drawMonthAtt();toast('삭제되었습니다');
}

/* ---- 일별: 특정 날짜 출석/결석/보강 체크 (오늘 요일 정규반만 자동으로 좁혀서 보여줌) ---- */
function attOn(mid){ return DB.attendance.find(a=>a.memberId===mid&&a.date===attDate); }
function attBtn(mid,st,label){
  const cur=attOn(mid); const on=cur&&(cur.status||'present')===st;
  return `<button class="btn ${on?'btn-primary':'btn-ghost'} btn-sm" onclick="setAtt('${mid}','${st}')">${on?'✓ ':''}${label}</button>`;
}
function attButtons(mid){ return `<div class="att-btns">${attBtn(mid,'present','출석')}${attBtn(mid,'absent','결석')}${attBtn(mid,'makeup','보강')}</div>`; }
function dowLabel(dateStr){ return DOW_KO[dowCodeOf(dateStr)]+'요일'; }
function drawDayAtt(){
  const wrap=document.getElementById('attWrap');
  wrap.innerHTML=`
    <div class="month-nav">
      <input type="date" id="attDate" value="${attDate}" style="background:var(--bg-soft);border:1px solid var(--line-strong);color:var(--ink);padding:9px 13px;border-radius:10px;font-family:inherit">
      <span class="muted" id="attDowLabel" style="margin-left:12px;font-size:12.5px">${dowLabel(attDate)} 정규반+보강 명단 · 스케줄표 동기화하면 자동 반영</span>
    </div>
    <div class="panel"><div class="panel-body" id="attTable"></div></div>
    <div class="panel" style="margin-top:14px"><div class="panel-body">
      <div class="searchbar" style="margin-bottom:4px">
        <input id="attExtraSearch" placeholder="오늘 목록에 없는 아이 검색 (보강 등)…" value="${attExtraQuery}">
      </div>
      <div id="attExtraResults"></div>
    </div></div>`;
  document.getElementById('attDate').addEventListener('change',e=>{
    attDate=e.target.value; attExtraQuery='';
    document.getElementById('attDowLabel').textContent=dowLabel(attDate)+' 정규반+보강 명단 · 스케줄표 동기화하면 자동 반영';
    document.getElementById('attExtraSearch').value='';
    drawDayTable(); drawExtraResults();
  });
  document.getElementById('attExtraSearch').addEventListener('input',e=>{attExtraQuery=e.target.value;drawExtraResults();});
  drawDayTable();
  drawExtraResults();
}
function makeupIdsForDate(dateStr){
  return new Set((DB.weeklyMakeup||[]).filter(function(w){return w.date===dateStr;}).map(function(w){return w.memberId;}));
}
function regularsForToday(){
  const dow=dowCodeOf(attDate);
  const checkedIds=new Set(DB.attendance.filter(a=>a.date===attDate).map(a=>a.memberId));
  const makeupIds=makeupIdsForDate(attDate);
  return sortMembersKo(DB.members).filter(m=>(m.days||[]).includes(dow) || checkedIds.has(m.id) || makeupIds.has(m.id));
}
function drawDayTable(){
  const el=document.getElementById('attTable');
  if(!DB.members.length){el.innerHTML=`<div class="empty"><div class="big">🧑‍🤝‍🧑</div>먼저 회원을 등록하세요.</div>`;return}
  const day=DB.attendance.filter(a=>a.date===attDate);
  const c={present:0,absent:0,makeup:0}; day.forEach(a=>c[a.status||'present']=(c[a.status||'present']||0)+1);
  const regulars=regularsForToday();
  const dow=dowCodeOf(attDate);
  const makeupIds=makeupIdsForDate(attDate);
  el.innerHTML=`
    <div style="display:flex;gap:14px;padding:0 22px 14px;font-size:12.5px" class="muted">
      <span>출석 <b style="color:var(--ink)">${c.present}</b></span>
      <span>결석 <b style="color:var(--ink)">${c.absent}</b></span>
      <span>보강 <b style="color:var(--ink)">${c.makeup}</b></span>
    </div>
    <table><thead><tr><th>회원</th><th>이번 달</th><th style="text-align:right">출석 상태</th></tr></thead><tbody>${
    regulars.length ? regulars.map(m=>{const used=monthlyUsed(m.id,attDate.slice(0,7));const q=quotaOf(m);
      const isMakeupOnly=!(m.days||[]).includes(dow) && makeupIds.has(m.id);
      const badge=isMakeupOnly?`<span class="tag" style="background:var(--gold);color:#fff;margin-left:6px;font-size:10.5px">보강</span>`:'';
      return `<tr>
        <td><div class="name-cell clickable" onclick="openDetail('${m.id}')"><div class="avatar" style="background:${avatarColor(m.name)}">${initials(m.name)}</div>${m.name}${badge}</div></td>
        <td class="muted">${used}/${q||'-'}</td>
        <td style="text-align:right">${attButtons(m.id)}</td>
      </tr>`}).join('') : `<tr><td colspan="3" class="muted" style="padding:18px 22px">오늘(${dowLabel(attDate)}) 정규반 회원이 없어요. 아래 검색창에서 보강 등으로 추가하세요.</td></tr>`
  }</tbody></table>`;
}
function drawExtraResults(){
  const el=document.getElementById('attExtraResults'); if(!el) return;
  const regularIds=new Set(regularsForToday().map(m=>m.id));
  const q=attExtraQuery.trim().toLowerCase();
  const matches=q ? sortMembersKo(DB.members).filter(m=>!regularIds.has(m.id) && (m.name||'').toLowerCase().includes(q)).slice(0,8) : [];

/* ================= Payments ================= */
function ymLabel(ym){ const [y,m]=ym.split('-'); return y+'년 '+Number(m)+'월'; }

/* ---- 수업료 납부 현황 (학생별 미지급 확인) ---- */
let tuitionMonth = todayISO().slice(0,7);
let tuitionFilter = 'all'; // 'all' | 'unpaid'
function shiftTuitionMonth(delta){
  let [y,m]=tuitionMonth.split('-').map(Number); m+=delta;
  if(m<1){m=12;y--;} if(m>12){m=1;y++;}
  tuitionMonth=y+'-'+String(m).padStart(2,'0');
  drawTuitionPanel();
}
function setTuitionFilter(f){ tuitionFilter=f; drawTuitionPanel(); }
function tuitionStatusCls(s){
  return s==='완납'?'tag-active':s==='미납'?'tag-expired':s==='부분납부'?'tag-low':'tag-adult';
}
function tuitionStatus(ym){
  const active=DB.members.filter(m=>!m.quit);
  return active.map(function(m){
    const t=tierOf(m.tierId);
    const price=t?Number(t.price)||0:0;
    const pays=DB.payments.filter(p=>p.memberId===m.id && billingYm(p.date)===ym);
    const paidAmt=pays.reduce((s,p)=>s+(Number(p.amount)||0),0);
    const allPays=DB.payments.filter(p=>p.memberId===m.id).sort((a,b)=>b.date.localeCompare(a.date));
    let status;
    if(!t||!price) status='미지정';
    else if(paidAmt<=0) status='미납';
    else if(paidAmt<price) status='부분납부';
    else status='완납';
    return {member:m, tier:t, price, paidAmt, payCount:pays.length, lastDate:allPays[0]?allPays[0].date:'', status};
  }).sort(function(a,b){
    const order={'미납':0,'부분납부':1,'미지정':2,'완납':3};
    if(order[a.status]!==order[b.status]) return order[a.status]-order[b.status];
    return a.member.name.localeCompare(b.member.name,'ko');
  });
}
function drawTuitionPanel(){
  const wrapLabel=document.getElementById('tuitionMonthLabel');
  const body=document.getElementById('tuitionPanelBody');
  if(!wrapLabel||!body) return;
  const list=tuitionStatus(tuitionMonth);
  const counts={완납:0,미납:0,부분납부:0,미지정:0};
  list.forEach(x=>counts[x.status]++);
  const shown = tuitionFilter==='unpaid' ? list.filter(x=>x.status==='미납'||x.status==='부분납부') : list;
  const summary=`<div class="stat-grid" style="margin-bottom:16px">
    <div class="stat"><div class="label">✅ 완납</div><div class="value">${counts.완납}명</div></div>
    <div class="stat"><div class="label">⚠️ 부분납부</div><div class="value">${counts.부분납부}명</div></div>
    <div class="stat"><div class="label">❌ 미납</div><div class="value">${counts.미납}명</div></div>
    <div class="stat"><div class="label">➖ 회원권 미지정</div><div class="value">${counts.미지정}명</div></div>
  </div>`;
  const filterBar=`<div class="tabs" style="margin-bottom:12px">
    <button class="tab ${tuitionFilter==='all'?'on':''}" onclick="setTuitionFilter('all')">전체 ${list.length}</button>
    <button class="tab ${tuitionFilter==='unpaid'?'on':''}" onclick="setTuitionFilter('unpaid')">미납·부분납부만 ${counts.미납+counts.부분납부}</button>
  </div>`;
  const rows=shown.map(x=>`<tr style="cursor:pointer" onclick="openDetail('${x.member.id}')">
      <td>${x.member.name}</td>
      <td class="muted">${x.tier?x.tier.name:'미지정'}</td>
      <td class="muted">${x.price?vnd(x.price):'-'}</td>
      <td><strong>${vnd(x.paidAmt)}</strong>${x.payCount?` <span class="muted" style="font-size:11px">(${x.payCount}건)</span>`:''}</td>
      <td><span class="tag ${tuitionStatusCls(x.status)}">${x.status}</span></td>
      <td class="muted">${x.lastDate||'-'}</td>
    </tr>`).join('') || `<tr><td colspan="6" class="muted" style="text-align:center;padding:16px">해당하는 학생이 없습니다.</td></tr>`;
  wrapLabel.textContent=ymLabel(tuitionMonth);
  wrapLabel.title=billingPeriodRange(tuitionMonth)+' 결제 기준';
  body.innerHTML=summary+filterBar+`<p class="muted" style="font-size:11.5px;margin:-4px 0 12px">결제 기준: ${billingPeriodRange(tuitionMonth)} (재등록 기간 반영)</p><table><thead><tr><th>이름</th><th>회원권</th><th>월 회비</th><th>${ymLabel(tuitionMonth)} 결제액</th><th>상태</th><th>최근 결제일</th></tr></thead><tbody>${rows}</tbody></table>`;
}
function monthlyRevenue(){
  const map={};
  DB.payments.forEach(function(p){
    if(!p.date) return; const ym=billingYm(p.date);
    if(!map[ym]) map[ym]={ym:ym,total:0,count:0,Cash:0,Transfer:0,Card:0,Etc:0};
    const amt=Number(p.amount)||0;
    map[ym].total+=amt; map[ym].count++;
    if(p.method==='Cash') map[ym].Cash+=amt;
    else if(p.method==='Transfer') map[ym].Transfer+=amt;
    else if(p.method==='Card') map[ym].Card+=amt;
    else map[ym].Etc+=amt;
  });
  return Object.values(map).sort(function(a,b){return b.ym.localeCompare(a.ym);});
}
function methodTotals(payments){
  const t={Cash:0,Transfer:0,Card:0,Etc:0,total:0};
  payments.forEach(function(p){
    const amt=Number(p.amount)||0; t.total+=amt;
    if(p.method==='Cash') t.Cash+=amt;
    else if(p.method==='Transfer') t.Transfer+=amt;
    else if(p.method==='Card') t.Card+=amt;
    else t.Etc+=amt;
  });
  return t;
}
function newVsRenewal(){
  // 사람별 첫 결제 = 신규, 이후 결제 = 재등록
  const byPerson={};
  DB.payments.forEach(function(p){
    const key=p.memberId||('name:'+(p.name||''));
    (byPerson[key]=byPerson[key]||[]).push(p);
  });
  const r={newAmt:0,newCnt:0,renewAmt:0,renewCnt:0};
  Object.values(byPerson).forEach(function(arr){
    arr.sort(function(a,b){return (a.date||'').localeCompare(b.date||'');});
    arr.forEach(function(p,i){
      const amt=Number(p.amount)||0;
      if(i===0){r.newAmt+=amt;r.newCnt++;} else {r.renewAmt+=amt;r.renewCnt++;}
    });
  });
  return r;
}
const WD_KO=['일','월','화','수','목','금','토'];
function weekdayPattern(){
  const wd=WD_KO.map(function(d){return {label:d,amt:0,cnt:0};});
  DB.payments.forEach(function(p){
    const s=(p.date||'').split('-'); if(s.length<3) return;
    const dow=new Date(Number(s[0]),Number(s[1])-1,Number(s[2])).getDay();
    wd[dow].amt+=Number(p.amount)||0; wd[dow].cnt++;
  });
  return wd;
}
const METHOD_META=[
  {key:'Cash',label:'현금',color:'var(--aqua)'},
  {key:'Transfer',label:'이체',color:'var(--wave)'},
  {key:'Card',label:'카드',color:'var(--gold)'},
  {key:'Etc',label:'기타',color:'var(--ink-faint)'}
];
function donutSVG(t){
  const C=2*Math.PI*50, total=t.total||1; let off=0;
  const segs=METHOD_META.filter(m=>t[m.key]>0).map(function(m){
    const len=t[m.key]/total*C;
    const s=`<circle cx="60" cy="60" r="50" fill="none" stroke="${m.color}" stroke-width="16" stroke-dasharray="${len.toFixed(2)} ${(C-len).toFixed(2)}" stroke-dashoffset="${(-off).toFixed(2)}" transform="rotate(-90 60 60)" stroke-linecap="butt"/>`;
    off+=len; return s;
  }).join('');
  return `<svg viewBox="0 0 120 120" width="150" height="150" style="flex-shrink:0">
    <circle cx="60" cy="60" r="50" fill="none" stroke="var(--bg-soft)" stroke-width="16"/>
    ${segs}
    <text x="60" y="55" text-anchor="middle" fill="var(--ink-dim)" style="font-size:9px">총 매출</text>
    <text x="60" y="70" text-anchor="middle" fill="var(--ink)" style="font-size:11px;font-weight:700">${(total/1e6).toFixed(0)}M</text>
  </svg>`;
}
function renderPayments(){
  const total=DB.payments.reduce((s,p)=>s+Number(p.amount),0);
  const month=billingYm(todayISO());
  const monthPays=DB.payments.filter(p=>billingYm(p.date)===month);
  const monthTotal=monthPays.reduce((s,p)=>s+Number(p.amount),0);
  const months=monthlyRevenue();
  const avgMonth=months.length?Math.round(total/months.length):0;
  const mt=methodTotals(DB.payments);

  // 요약 카드
  const cards=`<div class="stat-grid" style="margin-bottom:20px">
    <div class="stat"><div class="label">💰 누적 매출</div><div class="value" style="font-size:22px">${vnd(total)}</div><div class="sub">${DB.payments.length}건</div></div>
    <div class="stat"><div class="label">📅 이번 달</div><div class="value" style="font-size:22px">${vnd(monthTotal)}</div><div class="sub">${monthPays.length}건 · ${billingPeriodRange(month)}</div></div>
    <div class="stat"><div class="label">📊 월 평균</div><div class="value" style="font-size:22px">${vnd(avgMonth)}</div><div class="sub">${months.length}개월 기준</div></div>
    <div class="stat"><div class="label">🧾 건당 평균</div><div class="value" style="font-size:22px">${vnd(DB.payments.length?Math.round(total/DB.payments.length):0)}</div><div class="sub">결제 1건당</div></div>
  </div>`;

  // 결제수단 도넛 + 범례
  const legend=METHOD_META.filter(m=>mt[m.key]>0).map(function(m){
    const pct=mt.total?Math.round(mt[m.key]/mt.total*100):0;
    return `<div style="display:flex;align-items:center;gap:9px;margin-bottom:10px">
      <span style="width:12px;height:12px;border-radius:3px;background:${m.color};flex-shrink:0"></span>
      <span style="min-width:34px;font-weight:600">${m.label}</span>
      <span style="flex:1;text-align:right"><strong>${vnd(mt[m.key])}</strong></span>
      <span class="muted" style="min-width:38px;text-align:right;font-size:12px">${pct}%</span>
    </div>`;
  }).join('');
  const methodPanel=`<div class="panel" style="margin-bottom:20px">
    <div class="panel-head"><h3>💳 결제수단 비율</h3></div>
    <div class="panel-body" style="display:flex;gap:24px;align-items:center;flex-wrap:wrap">
      ${donutSVG(mt)}
      <div style="flex:1;min-width:200px">${legend||'<span class="muted">결제 내역이 없습니다.</span>'}</div>
    </div>
  </div>`;

  // 월별 매출 (전월 대비 증감)
  const maxTotal=months.reduce((m,x)=>Math.max(m,x.total),0)||1;
  const monthlyHTML = months.length ? months.map(function(x,i){
    const pct=Math.round(x.total/maxTotal*100);
    const prev=months[i+1]; // 한 칸 뒤가 더 이른 달
    let delta='';
    if(prev && prev.total>0){
      const d=Math.round((x.total-prev.total)/prev.total*100);
      const up=d>=0;
      delta=`<span style="font-size:11.5px;color:${up?'var(--aqua)':'var(--coral)'};font-weight:600">${up?'▲':'▼'} ${Math.abs(d)}%</span>`;
    }
    const seg=METHOD_META.filter(m=>x[m.key]>0).map(m=>`<span style="display:inline-flex;align-items:center;gap:4px"><span style="width:8px;height:8px;border-radius:2px;background:${m.color}"></span>${m.label} ${vnd(x[m.key])}</span>`).join('');
    return `<div style="margin-bottom:16px">
      <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:5px">
        <span style="font-weight:600" title="${billingPeriodRange(x.ym)}">${ymLabel(x.ym)} ${delta}</span>
        <span><strong style="font-size:15px">${vnd(x.total)}</strong> <span class="muted" style="font-size:12px">· ${x.count}건</span></span>
      </div>
      <div style="background:var(--bg-soft);border-radius:8px;height:10px;overflow:hidden">
        <div style="width:${pct}%;height:100%;background:linear-gradient(90deg,var(--aqua),var(--wave));border-radius:8px"></div>
      </div>
      ${seg?`<div class="muted" style="font-size:11px;margin-top:5px;display:flex;gap:14px;flex-wrap:wrap">${seg}</div>`:''}
    </div>`;
  }).join('') : `<div class="muted" style="padding:8px 0">결제 내역이 없습니다.</div>`;

  // 신규 vs 재등록
  const nr=newVsRenewal();
  const nrTotal=nr.newAmt+nr.renewAmt||1;
  const newPct=Math.round(nr.newAmt/nrTotal*100);
  const renewPct=100-newPct;
  const nrPanel=`<div class="panel" style="margin-bottom:20px">
    <div class="panel-head"><h3>🆕 신규 vs 재등록 매출</h3></div>
    <div class="panel-body">
      <div style="display:flex;height:26px;border-radius:8px;overflow:hidden;margin-bottom:14px;background:var(--bg-soft)">
        <div style="width:${newPct}%;background:var(--coral);min-width:${nr.newAmt?'2px':'0'}"></div>
        <div style="width:${renewPct}%;background:var(--aqua);min-width:${nr.renewAmt?'2px':'0'}"></div>
      </div>
      <div style="display:flex;gap:24px;flex-wrap:wrap">
        <div style="flex:1;min-width:170px;display:flex;align-items:center;gap:9px">
          <span style="width:12px;height:12px;border-radius:3px;background:var(--coral);flex-shrink:0"></span>
          <span style="font-weight:600">신규</span>
          <span style="flex:1;text-align:right"><strong>${vnd(nr.newAmt)}</strong> <span class="muted" style="font-size:12px">· ${nr.newCnt}건 · ${newPct}%</span></span>
        </div>
        <div style="flex:1;min-width:170px;display:flex;align-items:center;gap:9px">
          <span style="width:12px;height:12px;border-radius:3px;background:var(--aqua);flex-shrink:0"></span>
          <span style="font-weight:600">재등록</span>
          <span style="flex:1;text-align:right"><strong>${vnd(nr.renewAmt)}</strong> <span class="muted" style="font-size:12px">· ${nr.renewCnt}건 · ${renewPct}%</span></span>
        </div>
      </div>
      <p class="muted" style="font-size:11px;margin-top:10px">각 회원의 첫 결제를 신규, 그 이후 결제를 재등록으로 집계합니다.</p>
    </div>
  </div>`;

  // 요일별 결제 패턴
  const wd=weekdayPattern();
  const wdMax=wd.reduce((m,x)=>Math.max(m,x.amt),0)||1;
  const wdBars=wd.map(function(x,i){
    const h=Math.round(x.amt/wdMax*100);
    const wkend=(i===0||i===6);
    return `<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:6px">
      <div class="muted" style="font-size:10px;height:14px">${x.cnt||''}</div>
      <div style="width:100%;max-width:34px;height:110px;display:flex;align-items:flex-end">
        <div title="${vnd(x.amt)}" style="width:100%;height:${h}%;min-height:${x.amt?'3px':'0'};border-radius:6px 6px 0 0;background:${wkend?'var(--gold)':'linear-gradient(180deg,var(--wave),var(--aqua))'}"></div>
      </div>
      <div style="font-weight:600;font-size:13px;color:${wkend?'var(--gold)':'var(--ink)'}">${x.label}</div>
    </div>`;
  }).join('');
  const wdPanel=`<div class="panel" style="margin-bottom:20px">
    <div class="panel-head"><h3>📅 요일별 결제 패턴</h3><span class="muted" style="font-size:12px">막대=매출 · 위 숫자=건수</span></div>
    <div class="panel-body"><div style="display:flex;gap:8px;align-items:flex-end">${wdBars}</div></div>
  </div>`;

  main.innerHTML=`
    <div class="page-head">
      <div><h2>매출 분석</h2><p>누적 ${vnd(total)} · 이번 달 ${vnd(monthTotal)} <span class="muted" style="font-size:12px">(월 매출 기준: 전월 18일~당월 17일, 재등록 기간 반영)</span></p></div>
      <button class="btn btn-primary" onclick="openPay()">+ 결제 등록</button>
    </div>
    ${cards}
    <div class="panel" style="margin-bottom:20px">
      <div class="panel-head">
        <h3>🧾 수업료 납부 현황</h3>
        <div style="display:flex;align-items:center;gap:8px">
          <button class="btn btn-ghost btn-sm" onclick="shiftTuitionMonth(-1)">‹</button>
          <span id="tuitionMonthLabel" style="font-weight:600;min-width:86px;text-align:center;display:inline-block">${ymLabel(tuitionMonth)}</span>
          <button class="btn btn-ghost btn-sm" onclick="shiftTuitionMonth(1)">›</button>
        </div>
      </div>
      <div class="panel-body" id="tuitionPanelBody"></div>
    </div>
    ${methodPanel}
    ${nrPanel}
    ${wdPanel}
    <div class="panel" style="margin-bottom:20px">
      <div class="panel-head"><h3>📈 월별 매출</h3><span class="muted" style="font-size:12px">${months.length}개월 · 전월 대비</span></div>
      <div class="panel-body">${monthlyHTML}</div>
    </div>
    <div class="panel"><div class="panel-head"><h3>전체 결제 내역</h3></div><div class="panel-body" id="payTable"></div></div>`;
  drawPayments();
  drawTuitionPanel();
}
function drawPayments(){
  const el=document.getElementById('payTable');
  if(!DB.payments.length){el.innerHTML=`<div class="empty"><div class="big">💳</div>결제 내역이 없습니다.</div>`;return}
  const list=[...DB.payments].sort((a,b)=>b.date.localeCompare(a.date));
  el.innerHTML=`<table><thead><tr><th>날짜</th><th>회원</th><th>금액</th><th>결제수단</th><th>메모</th><th></th></tr></thead><tbody>${
    list.map(p=>`<tr>
      <td class="muted">${p.date}</td>
      <td>${p.name||memberName(p.memberId)}${p.memberId?'':' <span class="muted" style="font-size:11px">(미등록)</span>'}</td>
      <td><strong>${vnd(p.amount)}</strong></td>
      <td>${p.method?`<span class="tag ${p.method==='Cash'?'tag-active':p.method==='Transfer'?'tag-adult':'tag-kid'}">${methodKo(p.method)}</span>`:'-'}</td>
      <td class="muted">${p.memo||'-'}</td>
      <td style="text-align:right"><button class="btn btn-danger btn-sm" onclick="delPay('${p.id}')">삭제</button></td>
    </tr>`).join('')
  }</tbody></table>`;
}
function openPay(){
  const sel=document.getElementById('p_member');
  sel.innerHTML=sortMembersKo(DB.members).map(m=>`<option value="${m.id}">${m.name}</option>`).join('');
  document.getElementById('p_date').value=todayISO();
  document.getElementById('p_amount').value='';
  document.getElementById('p_memo').value='';
  if(!DB.members.length){toast('먼저 회원을 등록하세요');return}
  showModal('payModal');
}
function savePayment(){
  const memberId=document.getElementById('p_member').value;
  const amount=Number(document.getElementById('p_amount').value);
  if(!memberId||!amount){toast('회원과 금액을 입력하세요');return}
  DB.payments.push({id:id(),memberId,name:memberName(memberId),amount,method:document.getElementById('p_method').value||'',date:document.getElementById('p_date').value||todayISO(),memo:document.getElementById('p_memo').value.trim()});
  save();closeModal('payModal');render();toast('결제가 등록되었습니다');
}
function delPay(pid){
  if(!confirm('이 결제 내역을 삭제할까요?'))return;
  DB.payments=DB.payments.filter(p=>p.id!==pid);
  save();render();toast('삭제되었습니다');
}

/* ================= Birthdays ================= */
function renderBirthdays(){
  const list=DB.members.filter(m=>m.birth).map(m=>({m,d:daysUntilBirthday(m.birth)})).sort((a,b)=>a.d-b.d);
  main.innerHTML=`
    <div class="page-head"><div><h2>생일</h2><p>다가오는 순서로 정렬</p></div></div>
    ${list.length?`<div class="bday-list">${list.map(({m,d})=>{
      const bd=new Date(m.birth);
      const age=new Date().getFullYear()-bd.getFullYear();
      return `<div class="bday ${d<=14?'soon':''}">
        <div class="cake">${d===0?'🎉':'🎂'}</div>
        <div>
          <div style="font-weight:600">${m.name} ${m.kid?'<span class="tag tag-kid" style="margin-left:4px">어린이</span>':''}</div>
          <div class="muted">${bd.toLocaleDateString('ko-KR',{month:'long',day:'numeric'})} · 곧 ${age+(d===0?0:1)}세</div>
        </div>
        <div class="when"><div class="d">${d===0?'오늘! 🥳':'D-'+d}</div></div>
      </div>`}).join('')}</div>`
    :`<div class="panel"><div class="empty"><div class="big">🎂</div>생일이 등록된 회원이 없습니다.</div></div>`}`;
}

/* ================= Modal utils ================= */
function showModal(id){document.getElementById(id).classList.add('show')}
function closeModal(id){document.getElementById(id).classList.remove('show')}
document.querySelectorAll('.overlay').forEach(o=>o.addEventListener('click',e=>{if(e.target===o)o.classList.remove('show')}));

/* ================= Init ================= */
save();
render();
// 앱 열 때 자동 동기화 (URL이 저장돼 있으면 조용히)
if(localStorage.getItem(SYNC_URL_KEY)) setTimeout(function(){syncNow(true);}, 400);
</script>
</body>
</html>
